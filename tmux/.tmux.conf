set -g mouse on
set-option -g focus-events on
set -g display-time 3000

# prefix + P でポップアップターミナルを開く
bind P display-popup -d "#{pane_current_path}" -w 90% -h 80% -E "tmux new-session -A -s popup"

# prefix + S で session launcher (専用 session で fzf を常駐)
bind S run-shell "bash ~/.config/tmux/session-launcher.sh"

# Window を別の session に移動 (which-key から呼ばれる)
set -g command-alias[100] move-window-to-new-session='setenv -gF _MW_WINDOW_ID "#{window_id}" ; setenv -gF _MW_CLIENT "#{client_name}" ; display-popup -w 40 -h 3 -E "bash ~/.config/tmux/move-window-to-session.sh"'
set -g command-alias[101] move-window-via-launcher-move='run-shell "bash ~/.config/tmux/session-launcher.sh --move"'
set -g command-alias[102] move-window-via-launcher-send='run-shell "bash ~/.config/tmux/session-launcher.sh --send"'

# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @minimal-tmux-indicator false
set -g @minimal-tmux-justify "absolute-centre"
set -g @minimal-tmux-status-right "#{?client_prefix,#[bg=#698DDA]#[fg=#000000]#[bold] tmux ,#[bg=default]#[fg=default]#[nobold] tmux }#[bg=#E5C07B]#[fg=#1a1b26]#[bold]  #S "
set -g @minimal-tmux-window-status-format ' #W '
set -g @plugin 'niksingh710/minimal-tmux-status'

# Which-key
set -g @plugin 'alexwforsythe/tmux-which-key'

# treemux: Neovim の Neo-Tree を tmux sidebar として表示
# prefix + Tab (toggle) / prefix + Backspace (toggle + focus)
# pynvim は mise 管理の python に install 済み (docs/tmux.md 参照)
set -g @treemux-tree-client 'neo-tree'
set -g @treemux-python-command '~/.local/share/mise/shims/python3'
set -g @treemux-tree-nvim-init-file '~/.config/tmux/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
